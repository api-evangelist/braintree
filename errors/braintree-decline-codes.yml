generated: '2026-07-14'
method: searched
source: https://developer.paypal.com/braintree/docs/reference/general/processor-responses/authorization-responses
description: >-
  Braintree's processor authorization response-code taxonomy — the issuer/
  processor-level reasons a card charge is approved or declined. Distinct from
  API-level validation errors (the ApiError envelope): these appear on a
  transaction as processorResponseCode + processorResponseText, with the
  transaction status set to processor_declined when success is false. Codes are
  grouped in classes: 1000-series = approved (success true), 2000-series =
  declined by the processor (success false), 3000-series = back-end processing
  network problem. Separately, the gateway itself can block a transaction before
  it reaches the bank (gateway rejection).
docs:
  - https://developer.paypal.com/braintree/docs/reference/general/processor-responses/authorization-responses
  - https://developer.paypal.com/braintree/articles/control-panel/transactions/declines
envelope_field: processorResponseCode   # with processorResponseText; on the transaction object
code_classes:
  - {class: '1000', meaning: 'Approved — authorization successful, success = true'}
  - {class: '2000', meaning: 'Declined — declined by the processor/issuer, success = false'}
  - {class: '3000', meaning: 'Network — back-end processing network problem'}
