specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Braintree
providerId: braintree
publisherName: PayPal, Inc.
serviceCategory: Payments
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Payments
  - Credit Cards
  - PayPal
  - Venmo
  - ACH
  - FinOps
  - FOCUS
description: 'FOCUS-aligned FinOps for Braintree: pure take-rate per-transaction pricing across cards,
  digital wallets, Venmo and ACH, with surcharges for non-USD presentment and non-US issued cards plus
  per-incident chargeback fees and optional Chargeback Protection / Fraud Protection Lite.'
sources:
  - https://www.paypal.com/us/enterprise/paypal-braintree-fees
  - https://developer.paypal.com/braintree/docs
billingModel:
  pricingCategory: Take Rate
  billingFrequency: Continuous Settlement
  billingCurrency: USD (settlement varies)
  chargeCategories:
    - Usage
    - Adjustment
    - Refund
    - Tax
focusColumns:
  ServiceName: Braintree
  ServiceCategory: Payments
  ProviderName: Braintree
  PublisherName: PayPal, Inc.
  InvoiceIssuerName: PayPal, Inc.
  BillingCurrency: USD
  PricingCategory: Standard
  PricingUnit: transaction
meters:
  - name: card_transactions
    description: Card and digital wallet transactions priced at 2.89% + $0.29.
    unit: transaction
    aggregation: sum
    dimensions:
      - card_brand
      - country
      - currency
      - merchant_account
  - name: venmo_transactions
    description: Venmo transactions priced at 3.49% + $0.49 (US only).
    unit: transaction
    aggregation: sum
    dimensions:
      - merchant_account
  - name: ach_transactions
    description: ACH Direct Debit transactions priced at 0.75% capped at $5.00.
    unit: transaction
    aggregation: sum
    dimensions:
      - merchant_account
  - name: amex_passthrough
    description: $0.15 per transaction pass-through fee for merchants with a direct American Express
      account.
    unit: transaction
    aggregation: sum
    dimensions:
      - merchant_account
  - name: chargebacks
    description: $15.00 per disputed transaction.
    unit: dispute
    aggregation: sum
    dimensions:
      - merchant_account
      - reason_code
  - name: ach_returns
    description: $5.00 per ACH return / unauthorized claim.
    unit: incident
    aggregation: sum
    dimensions:
      - merchant_account
  - name: chargeback_protection
    description: Add-on rate (starting at 0.4%) on transactions covered by Chargeback Protection.
    unit: transaction
    aggregation: sum
    dimensions:
      - merchant_account
  - name: fraud_protection_inquiries
    description: Fraud Protection Lite inquiries at $0.05 each.
    unit: inquiry
    aggregation: sum
    dimensions:
      - merchant_account
principles:
  - name: Visibility
    description: Pull transaction-level data via the Transaction Search API and the Braintree Control
      Panel reports; reconcile gross volume, fees, refunds, and disputes daily.
  - name: Allocation
    description: Use sub-merchant accounts and order metadata to attribute revenue and fees to product
      lines, brands, or marketplaces.
  - name: Optimization
    description: Negotiate custom interchange-plus / volume rates as processing history matures, route
      eligible volume through preferred payment methods, mitigate disputes early with Chargeback Protection,
      and minimize cross-border surcharges via local presentment currencies.
  - name: Accountability
    description: Designate a payments owner; review effective take rate, dispute rate, and refund rate
      monthly; alert on variance against modeled cost-of-payments.
maintainers:
  - FN: Kin Lane
    email: info@apievangelist.com
