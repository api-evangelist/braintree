naftiko: 1.0.0-alpha2
info:
  label: Braintree Payments API — Customers
  description: 'Braintree Payments API — Customers. 4 operations. Lead operation: Create a customer. Self-contained Naftiko
    capability covering one Braintree business surface.'
  tags:
  - Braintree
  - Customers
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BRAINTREE_API_KEY: BRAINTREE_API_KEY
capability:
  consumes:
  - type: http
    namespace: payments-customers
    baseUri: https://api.braintreegateway.com/merchants/{merchantId}
    description: Braintree Payments API — Customers business capability. Self-contained, no shared references.
    resources:
    - name: customers
      path: /customers
      operations:
      - name: createcustomer
        method: POST
        description: Create a customer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: customers-customerId
      path: /customers/{customerId}
      operations:
      - name: getcustomer
        method: GET
        description: Get a customer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatecustomer
        method: PUT
        description: Update a customer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletecustomer
        method: DELETE
        description: Delete a customer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.BRAINTREE_USER}}'
      password: '{{env.BRAINTREE_PASS}}'
  exposes:
  - type: rest
    namespace: payments-customers-rest
    port: 8080
    description: REST adapter for Braintree Payments API — Customers. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/customers
      name: customers
      description: REST surface for customers.
      operations:
      - method: POST
        name: createcustomer
        description: Create a customer
        call: payments-customers.createcustomer
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/customers/{customerid}
      name: customers-customerid
      description: REST surface for customers-customerId.
      operations:
      - method: GET
        name: getcustomer
        description: Get a customer
        call: payments-customers.getcustomer
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatecustomer
        description: Update a customer
        call: payments-customers.updatecustomer
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletecustomer
        description: Delete a customer
        call: payments-customers.deletecustomer
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: payments-customers-mcp
    port: 9090
    transport: http
    description: MCP adapter for Braintree Payments API — Customers. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: create-customer
      description: Create a customer
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: payments-customers.createcustomer
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-customer
      description: Get a customer
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: payments-customers.getcustomer
      outputParameters:
      - type: object
        mapping: $.
    - name: update-customer
      description: Update a customer
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: payments-customers.updatecustomer
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-customer
      description: Delete a customer
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: payments-customers.deletecustomer
      outputParameters:
      - type: object
        mapping: $.
