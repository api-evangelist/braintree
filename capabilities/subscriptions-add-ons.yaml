naftiko: 1.0.0-alpha2
info:
  label: Braintree Subscriptions API — Add-Ons
  description: 'Braintree Subscriptions API — Add-Ons. 1 operations. Lead operation: List add-ons. Self-contained Naftiko
    capability covering one Braintree business surface.'
  tags:
  - Braintree
  - Add-Ons
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BRAINTREE_API_KEY: BRAINTREE_API_KEY
capability:
  consumes:
  - type: http
    namespace: subscriptions-add-ons
    baseUri: https://api.braintreegateway.com/merchants/{merchantId}
    description: Braintree Subscriptions API — Add-Ons business capability. Self-contained, no shared references.
    resources:
    - name: add_ons
      path: /add_ons
      operations:
      - name: listaddons
        method: GET
        description: List add-ons
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.BRAINTREE_USER}}'
      password: '{{env.BRAINTREE_PASS}}'
  exposes:
  - type: rest
    namespace: subscriptions-add-ons-rest
    port: 8080
    description: REST adapter for Braintree Subscriptions API — Add-Ons. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/add-ons
      name: add-ons
      description: REST surface for add_ons.
      operations:
      - method: GET
        name: listaddons
        description: List add-ons
        call: subscriptions-add-ons.listaddons
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: subscriptions-add-ons-mcp
    port: 9090
    transport: http
    description: MCP adapter for Braintree Subscriptions API — Add-Ons. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-add-ons
      description: List add-ons
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: subscriptions-add-ons.listaddons
      outputParameters:
      - type: object
        mapping: $.
