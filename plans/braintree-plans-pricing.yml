specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Braintree
providerId: braintree
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Payments
  - Credit Cards
  - PayPal
  - Venmo
  - ACH
  - Fraud Prevention
description: Braintree (a PayPal service) is product-priced per transaction with no monthly subscription
  fee on standard accounts. Cards and digital wallets carry one rate, Venmo a higher rate, and ACH Direct
  Debit a percentage capped per transaction. Surcharges apply for non-USD presentment and non-US issued
  cards. Custom rates are available for established merchants and verified 501(c)(3) charities.
sources:
  - https://www.paypal.com/us/enterprise/paypal-braintree-fees
plans:
  - id: braintree-cards-and-digital-wallets
    name: Cards and Digital Wallets - Standard
    type: usage-based
    description: Standard per-transaction pricing for cards and digital wallets.
    entries:
      - label: Card / digital wallet transaction
        name: tx_card_digital_wallet
        type: metered
        metric: transaction
        limit: -1
        timeFrame: usage
        geo: US
        unit: 1
        price: 2.89% + $0.29
        userMultiplied: false
      - label: Non-USD presentment surcharge
        name: tx_non_usd_surcharge
        type: metered
        metric: transaction
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: +1%
        userMultiplied: false
      - label: Non-US issued card surcharge
        name: tx_non_us_card_surcharge
        type: metered
        metric: transaction
        limit: -1
        timeFrame: usage
        geo: non-US
        unit: 1
        price: +1%
        userMultiplied: false
      - label: American Express pass-through
        name: tx_amex_passthrough
        type: metered
        metric: transaction
        limit: -1
        timeFrame: usage
        geo: US
        unit: 1
        price: $0.15
        userMultiplied: false
    elements:
      - name: Cards (Visa, Mastercard, American Express, Discover)
      - name: Digital Wallets (PayPal, Apple Pay, Google Pay)
      - name: Custom rates available for established merchants
  - id: braintree-venmo
    name: Venmo
    type: usage-based
    description: Per-transaction pricing for Venmo (US only).
    entries:
      - label: Venmo transaction
        name: tx_venmo
        type: metered
        metric: transaction
        limit: -1
        timeFrame: usage
        geo: US
        unit: 1
        price: 3.49% + $0.49
        userMultiplied: false
    elements:
      - name: Venmo (US only)
  - id: braintree-ach-direct-debit
    name: ACH Direct Debit
    type: usage-based
    description: Per-transaction pricing for ACH Direct Debit, capped per transaction.
    entries:
      - label: ACH Direct Debit transaction
        name: tx_ach
        type: metered
        metric: transaction
        limit: -1
        timeFrame: usage
        geo: US
        unit: 1
        price: 0.75% (capped at $5.00)
        userMultiplied: false
      - label: ACH return / unauthorized claim
        name: ach_return
        type: metered
        metric: incident
        limit: -1
        timeFrame: usage
        geo: US
        unit: 1
        price: $5.00
        userMultiplied: false
    elements:
      - name: ACH Direct Debit
  - id: braintree-charity
    name: Charity Rates
    type: usage-based
    description: Reduced card processing rates for verified 501(c)(3) organizations.
    entries:
      - label: Charity card transaction
        name: tx_charity
        type: metered
        metric: transaction
        limit: -1
        timeFrame: usage
        geo: US
        unit: 1
        price: 2.19% + $0.29
        userMultiplied: false
    elements:
      - name: 501(c)(3) Verified Charity Pricing
  - id: braintree-disputes
    name: Disputes and Chargebacks
    type: usage-based
    description: Per-incident chargeback fees and value-added dispute services.
    entries:
      - label: Chargeback
        name: chargeback
        type: metered
        metric: dispute
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: $15.00
        userMultiplied: false
      - label: Chargeback Protection
        name: chargeback_protection
        type: metered
        metric: transaction
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: starting at 0.4%
        userMultiplied: false
      - label: Fraud Protection Lite
        name: fraud_protection_lite
        type: metered
        metric: inquiry
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: $0.05
        userMultiplied: false
    elements:
      - name: Chargeback Handling
      - name: Chargeback Protection (add-on)
      - name: Fraud Protection Lite (add-on)
  - id: braintree-enterprise
    name: Enterprise / Custom
    type: enterprise
    description: Custom interchange-plus and volume pricing for established merchants.
    entries:
      - label: Custom transaction pricing
        name: tx_custom
        type: metered
        metric: transaction
        limit: -1
        timeFrame: usage
        geo: configurable
        unit: 1
        price: custom (interchange-plus / volume-discounted)
        userMultiplied: false
    elements:
      - name: Negotiated Rates
      - name: Dedicated Account Management
      - name: Volume Discounts
maintainers:
  - FN: Kin Lane
    email: info@apievangelist.com
